<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claude_trader 成績ダッシュボード</title>
</head>
<body>
<style>
:root {
  --page: #f9f9f7; --surface: #fcfcfb;
  --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
  --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
  --series: #2a78d6; --good: #006300; --bad: #d03b3b;
}
@media (prefers-color-scheme: dark) {
  :root {
    --page: #0d0d0d; --surface: #1a1a19;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --series: #3987e5; --good: #0ca30c; --bad: #d03b3b;
  }
}
:root[data-theme="dark"] {
  --page: #0d0d0d; --surface: #1a1a19;
  --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
  --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
  --series: #3987e5; --good: #0ca30c; --bad: #d03b3b;
}
:root[data-theme="light"] {
  --page: #f9f9f7; --surface: #fcfcfb;
  --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
  --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
  --series: #2a78d6; --good: #006300; --bad: #d03b3b;
}
body {
  background: var(--page); color: var(--ink);
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
  margin: 0; line-height: 1.55;
}
.wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 48px; }
header h1 { font-size: 1.25rem; font-weight: 650; margin: 0; letter-spacing: .01em; }
header .sub { color: var(--ink-2); font-size: .84rem; margin-top: 2px; }
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 22px 0 16px; }
.tile { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px 12px; }
.tile .label { font-size: .76rem; color: var(--ink-2); letter-spacing: .02em; }
.tile .value { font-size: 1.45rem; font-weight: 600; margin-top: 2px; }
.tile.hero .value { font-size: 1.9rem; }
.tile .delta { font-size: .8rem; margin-top: 2px; color: var(--ink-2); }
.up { color: var(--good); } .down { color: var(--bad); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card h2 { font-size: .92rem; font-weight: 650; margin: 0 0 10px; }
.card .note { color: var(--muted); font-size: .8rem; }
#chart { position: relative; }
#chart svg { display: block; width: 100%; }
#tooltip {
  position: absolute; pointer-events: none; display: none;
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: .78rem; box-shadow: 0 2px 8px rgba(0,0,0,.12); white-space: nowrap; z-index: 2;
}
.tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.tabs button {
  font: inherit; font-size: .84rem; padding: 5px 14px; border-radius: 999px;
  border: 1px solid var(--border); background: transparent; color: var(--ink-2); cursor: pointer;
}
.tabs button[aria-selected="true"] { background: var(--series); border-color: var(--series); color: #fff; font-weight: 600; }
.tabs button:focus-visible { outline: 2px solid var(--series); outline-offset: 2px; }
.tbl { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; font-size: .84rem; font-variant-numeric: tabular-nums; }
th { text-align: left; color: var(--muted); font-weight: 500; font-size: .76rem; padding: 4px 10px; border-bottom: 1px solid var(--grid); }
td { padding: 6px 10px; border-bottom: 1px solid var(--grid); }
tr:last-child td { border-bottom: none; }
th.num, td.num { text-align: right; }
.chip { display: inline-block; font-size: .72rem; font-weight: 600; padding: 1px 8px; border-radius: 999px; }
.chip.buy { background: color-mix(in srgb, var(--series) 14%, transparent); color: var(--series); }
.chip.sell { background: color-mix(in srgb, var(--muted) 18%, transparent); color: var(--ink-2); }
.reason { color: var(--ink-2); font-size: .78rem; }
footer { color: var(--muted); font-size: .75rem; margin-top: 24px; }
[hidden] { display: none !important; }
</style>

<div class="wrap">
  <header>
    <h1>claude_trader 成績ダッシュボード</h1>
    <div class="sub">軍資金 <span id="h-capital"></span> ・ <span id="h-start"></span> 運用開始 ・ 更新 <span id="h-gen"></span></div>
  </header>

  <div class="tiles">
    <div class="tile hero"><div class="label">総資産</div><div class="value" id="t-total"></div><div class="delta" id="t-total-d"></div></div>
    <div class="tile"><div class="label">前営業日比</div><div class="value" id="t-day"></div><div class="delta" id="t-day-d"></div></div>
    <div class="tile"><div class="label">累積損益</div><div class="value" id="t-cum"></div><div class="delta" id="t-cum-d"></div></div>
    <div class="tile"><div class="label">現金</div><div class="value" id="t-cash"></div><div class="delta" id="t-cash-d"></div></div>
  </div>

  <div class="card">
    <h2>資産推移（日次終値評価）</h2>
    <div id="chart"><div id="tooltip"></div></div>
    <div class="note" id="chart-note"></div>
  </div>

  <div class="card">
    <div class="tabs" role="tablist">
      <button role="tab" id="tab-d" aria-selected="true" aria-controls="pane-d">日次</button>
      <button role="tab" id="tab-w" aria-selected="false" aria-controls="pane-w">週次</button>
      <button role="tab" id="tab-m" aria-selected="false" aria-controls="pane-m">月次</button>
    </div>
    <div class="tbl" id="pane-d" role="tabpanel" aria-labelledby="tab-d"></div>
    <div class="tbl" id="pane-w" role="tabpanel" aria-labelledby="tab-w" hidden></div>
    <div class="tbl" id="pane-m" role="tabpanel" aria-labelledby="tab-m" hidden></div>
  </div>

  <div class="card">
    <h2>現在の保有</h2>
    <div class="tbl" id="holdings"></div>
  </div>

  <div class="card">
    <h2>売買履歴</h2>
    <div class="tbl" id="trades"></div>
  </div>

  <footer>本サイトの売買はすべて仮想ペーパートレード（当日終値約定・手数料ゼロ）です。実際の投資を推奨するものではありません。</footer>
</div>

<script>
const DATA = {"generated": "2026-07-08 16:58 JST", "capital_start": 500000, "start_date": "2026-07-08", "daily": [{"date": "2026-07-08", "total": 500000.0, "change": null, "change_pct": null, "cash": 51023.0}], "weekly": [{"label": "7/6週", "end": "2026-07-08", "total": 500000.0, "change": 0.0, "change_pct": 0.0}], "monthly": [{"label": "2026年7月", "end": "2026-07-08", "total": 500000.0, "change": 0.0, "change_pct": 0.0}], "trades": [{"date": "2026-07-08", "side": "buy", "ticker": "4502.T", "name": "武田薬品工業", "shares": 22, "price": 5451.0, "value": 119922.0, "reason": "スコア+11.22(ランク1位)で新規買い"}, {"date": "2026-07-08", "side": "buy", "ticker": "6098.T", "name": "リクルートホールディングス", "shares": 10, "price": 12180.0, "value": 121800.0, "reason": "スコア+9.18(ランク2位)で新規買い"}, {"date": "2026-07-08", "side": "buy", "ticker": "9983.T", "name": "ファーストリテイリング", "shares": 1, "price": 87100.0, "value": 87100.0, "reason": "スコア+8.77(ランク3位)で新規買い"}, {"date": "2026-07-08", "side": "buy", "ticker": "8306.T", "name": "三菱UFJフィナンシャル・グループ", "shares": 35, "price": 3433.0, "value": 120155.0, "reason": "スコア+7.96(ランク4位)で新規買い"}], "holdings": [{"ticker": "4502.T", "shares": 22, "price": 5451.0, "value": 119922.0, "name": "武田薬品工業"}, {"ticker": "6098.T", "shares": 10, "price": 12180.0, "value": 121800.0, "name": "リクルートホールディングス"}, {"ticker": "9983.T", "shares": 1, "price": 87100.0, "value": 87100.0, "name": "ファーストリテイリング"}, {"ticker": "8306.T", "shares": 35, "price": 3433.0, "value": 120155.0, "name": "三菱UFJフィナンシャル・グループ"}], "cash": 51023.0};

const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
const signedYen = n => (n >= 0 ? "+" : "−") + "¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP");
const pct = n => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
const cls = n => n >= 0 ? "up" : "down";
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ── ヘッダー・統計タイル ─────────────────────────────
const daily = DATA.daily;
const last = daily[daily.length - 1];
document.getElementById("h-capital").textContent = yen(DATA.capital_start);
document.getElementById("h-start").textContent = DATA.start_date;
document.getElementById("h-gen").textContent = DATA.generated;
document.getElementById("t-total").textContent = yen(last.total);
document.getElementById("t-total-d").textContent = last.date + " 終値評価";
const dayD = document.getElementById("t-day"), dayDd = document.getElementById("t-day-d");
if (last.change == null) { dayD.textContent = "—"; dayDd.textContent = "初日（比較対象なし）"; }
else {
  dayD.textContent = signedYen(last.change); dayD.className = "value " + cls(last.change);
  dayDd.textContent = pct(last.change_pct);  dayDd.className = "delta " + cls(last.change);
}
const cum = last.total - DATA.capital_start;
const cumEl = document.getElementById("t-cum");
cumEl.textContent = signedYen(cum); cumEl.className = "value " + cls(cum);
const cumD = document.getElementById("t-cum-d");
cumD.textContent = pct(cum / DATA.capital_start * 100); cumD.className = "delta " + cls(cum);
document.getElementById("t-cash").textContent = yen(DATA.cash);
document.getElementById("t-cash-d").textContent = (DATA.cash / last.total * 100).toFixed(1) + "% 待機";

// ── 資産推移チャート ─────────────────────────────────
function drawChart() {
  const host = document.getElementById("chart");
  const tip = document.getElementById("tooltip");
  host.querySelectorAll("svg").forEach(s => s.remove());
  const css = getComputedStyle(document.documentElement);
  const C = name => css.getPropertyValue(name).trim();
  const W = host.clientWidth, H = 260, m = {t: 14, r: 18, b: 26, l: 58};
  const iw = W - m.l - m.r, ih = H - m.t - m.b;
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("height", H);

  const totals = daily.map(d => d.total);
  let lo = Math.min(...totals, DATA.capital_start), hi = Math.max(...totals, DATA.capital_start);
  const pad = Math.max((hi - lo) * 0.08, hi * 0.004);
  lo -= pad; hi += pad;
  const X = i => daily.length === 1 ? m.l + iw / 2 : m.l + iw * i / (daily.length - 1);
  const Y = v => m.t + ih * (1 - (v - lo) / (hi - lo));

  // 横グリッド＋Y軸ラベル（キリのいい間隔）
  const rawStep = (hi - lo) / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const step = [1, 2, 2.5, 5, 10].map(k => k * mag).find(s => s >= rawStep);
  for (let v = Math.ceil(lo / step) * step; v <= hi; v += step) {
    const g = document.createElementNS(ns, "line");
    g.setAttribute("x1", m.l); g.setAttribute("x2", W - m.r);
    g.setAttribute("y1", Y(v)); g.setAttribute("y2", Y(v));
    g.setAttribute("stroke", C("--grid")); g.setAttribute("stroke-width", 1);
    svg.appendChild(g);
    const t = document.createElementNS(ns, "text");
    t.setAttribute("x", m.l - 8); t.setAttribute("y", Y(v) + 4);
    t.setAttribute("text-anchor", "end"); t.setAttribute("font-size", 11);
    t.setAttribute("fill", C("--muted"));
    t.textContent = (v / 10000).toFixed(1) + "万";
    svg.appendChild(t);
  }

  // X軸ラベル（最大6個）
  const tickEvery = Math.max(1, Math.ceil(daily.length / 6));
  daily.forEach((d, i) => {
    if (i % tickEvery !== 0 && i !== daily.length - 1) return;
    const t = document.createElementNS(ns, "text");
    t.setAttribute("x", X(i)); t.setAttribute("y", H - 8);
    t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", 11);
    t.setAttribute("fill", C("--muted"));
    t.textContent = d.date.slice(5).replace("-", "/");
    svg.appendChild(t);
  });

  if (daily.length > 1) {
    const pts = daily.map((d, i) => `${X(i)},${Y(d.total)}`);
    const area = document.createElementNS(ns, "path");
    area.setAttribute("d", `M${pts.join("L")}L${X(daily.length - 1)},${Y(lo)}L${X(0)},${Y(lo)}Z`);
    area.setAttribute("fill", C("--series")); area.setAttribute("opacity", "0.1");
    svg.appendChild(area);
    const line = document.createElementNS(ns, "path");
    line.setAttribute("d", "M" + pts.join("L"));
    line.setAttribute("fill", "none"); line.setAttribute("stroke", C("--series"));
    line.setAttribute("stroke-width", 2); line.setAttribute("stroke-linejoin", "round");
    line.setAttribute("stroke-linecap", "round");
    svg.appendChild(line);
  }
  // 終端ドット（サーフェスリング付き）
  const dot = document.createElementNS(ns, "circle");
  dot.setAttribute("cx", X(daily.length - 1)); dot.setAttribute("cy", Y(last.total));
  dot.setAttribute("r", 4.5); dot.setAttribute("fill", C("--series"));
  dot.setAttribute("stroke", C("--surface")); dot.setAttribute("stroke-width", 2);
  svg.appendChild(dot);

  // ホバー: クロスヘア＋ツールチップ
  const hair = document.createElementNS(ns, "line");
  hair.setAttribute("stroke", C("--baseline")); hair.setAttribute("stroke-width", 1);
  hair.setAttribute("y1", m.t); hair.setAttribute("y2", m.t + ih); hair.style.display = "none";
  svg.appendChild(hair);
  const hoverDot = document.createElementNS(ns, "circle");
  hoverDot.setAttribute("r", 4.5); hoverDot.setAttribute("fill", C("--series"));
  hoverDot.setAttribute("stroke", C("--surface")); hoverDot.setAttribute("stroke-width", 2);
  hoverDot.style.display = "none";
  svg.appendChild(hoverDot);

  function onMove(ev) {
    const rect = svg.getBoundingClientRect();
    const px = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
    let best = 0, bd = Infinity;
    daily.forEach((d, i) => { const dd = Math.abs(X(i) - px); if (dd < bd) { bd = dd; best = i; } });
    const d = daily[best], x = X(best), y = Y(d.total);
    hair.setAttribute("x1", x); hair.setAttribute("x2", x); hair.style.display = "";
    hoverDot.setAttribute("cx", x); hoverDot.setAttribute("cy", y); hoverDot.style.display = "";
    tip.innerHTML = `<strong>${esc(d.date)}</strong><br>${yen(d.total)}` +
      (d.change != null ? ` <span class="${cls(d.change)}">${signedYen(d.change)} (${pct(d.change_pct)})</span>` : "");
    tip.style.display = "block";
    const tw = tip.offsetWidth;
    tip.style.left = Math.min(Math.max(x - tw / 2, 0), W - tw) + "px";
    tip.style.top = (y - tip.offsetHeight - 14) + "px";
  }
  function onLeave() { hair.style.display = "none"; hoverDot.style.display = "none"; tip.style.display = "none"; }
  svg.addEventListener("mousemove", onMove);
  svg.addEventListener("mouseleave", onLeave);
  svg.addEventListener("touchstart", onMove, {passive: true});
  svg.addEventListener("touchmove", onMove, {passive: true});
  host.appendChild(svg);
}
drawChart();
let rT; addEventListener("resize", () => { clearTimeout(rT); rT = setTimeout(drawChart, 150); });
document.getElementById("chart-note").textContent =
  daily.length === 1 ? "初日です。営業日ごとにデータが積み上がります。" : daily.length + " 営業日分";

// ── 日次・週次・月次テーブル ─────────────────────────
function deltaCells(chg, pctv) {
  if (chg == null) return '<td class="num">—</td><td class="num">—</td>';
  return `<td class="num ${cls(chg)}">${signedYen(chg)}</td><td class="num ${cls(chg)}">${pct(pctv)}</td>`;
}
function table(headers, rows) {
  return `<table><thead><tr>${headers.map((h, i) => `<th${i ? ' class="num"' : ""}>${h}</th>`).join("")}</thead><tbody>${rows.join("")}</tbody></table>`;
}
document.getElementById("pane-d").innerHTML = table(
  ["日付", "総資産", "前日比", "前日比%", "現金"],
  [...daily].reverse().map(d =>
    `<tr><td>${esc(d.date)}</td><td class="num">${yen(d.total)}</td>${deltaCells(d.change, d.change_pct)}<td class="num">${yen(d.cash)}</td></tr>`)
);
document.getElementById("pane-w").innerHTML = table(
  ["週", "週末資産", "週間損益", "週間損益%"],
  [...DATA.weekly].reverse().map(w =>
    `<tr><td>${esc(w.label)}<span class="reason">（〜${esc(w.end)}）</span></td><td class="num">${yen(w.total)}</td>${deltaCells(w.change, w.change_pct)}</tr>`)
);
document.getElementById("pane-m").innerHTML = table(
  ["月", "月末資産", "月間損益", "月間損益%"],
  [...DATA.monthly].reverse().map(mo =>
    `<tr><td>${esc(mo.label)}</td><td class="num">${yen(mo.total)}</td>${deltaCells(mo.change, mo.change_pct)}</tr>`)
);

// タブ切替
const tabs = [["tab-d", "pane-d"], ["tab-w", "pane-w"], ["tab-m", "pane-m"]];
tabs.forEach(([tabId, paneId]) => {
  document.getElementById(tabId).addEventListener("click", () => {
    tabs.forEach(([t, p]) => {
      document.getElementById(t).setAttribute("aria-selected", String(t === tabId));
      document.getElementById(p).hidden = p !== paneId;
    });
  });
});

// ── 保有・売買履歴 ───────────────────────────────────
document.getElementById("holdings").innerHTML = table(
  ["銘柄", "株数", "株価", "評価額"],
  DATA.holdings.map(h =>
    `<tr><td>${esc(h.name)} <span class="reason">${esc(h.ticker)}</span></td><td class="num">${h.shares}</td><td class="num">${yen(h.price)}</td><td class="num">${yen(h.value)}</td></tr>`
  ).concat([`<tr><td>現金</td><td class="num">—</td><td class="num">—</td><td class="num">${yen(DATA.cash)}</td></tr>`])
);
document.getElementById("trades").innerHTML = DATA.trades.length
  ? table(
      ["日付", "売買", "銘柄", "株数", "約定額", "理由"],
      DATA.trades.map(t =>
        `<tr><td>${esc(t.date)}</td><td><span class="chip ${t.side}">${t.side === "buy" ? "買" : "売"}</span></td>` +
        `<td>${esc(t.name)}</td><td class="num">${t.shares}</td><td class="num">${yen(t.value)}</td>` +
        `<td class="reason">${esc(t.reason)}</td></tr>`))
  : '<div class="note">まだ売買はありません。</div>';
</script>

</body>
</html>
