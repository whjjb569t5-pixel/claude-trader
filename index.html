const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
const signedYen = n => (n >= 0 ? "+" : "−") + "¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP");
const pct = n => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
const cls = n => n >= 0 ? "up" : "down";
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const SERIES = ["--s1", "--s2", "--s3"];
const colorOf = i => getComputedStyle(document.documentElement).getPropertyValue(SERIES[i % SERIES.length]).trim();

document.getElementById("h-gen").textContent = DATA.generated;

function table(headers, rows) {
  return `<table><thead><tr>${headers.map((h, i) => `<th${i ? ' class="num"' : ""}>${h}</th>`).join("")}</thead><tbody>${rows.join("")}</tbody></table>`;
}
function deltaCells(chg, pctv) {
  if (chg == null) return '<td class="num">—</td><td class="num">—</td>';
  return `<td class="num ${cls(chg)}">${signedYen(chg)}</td><td class="num ${cls(chg)}">${pct(pctv)}</td>`;
}

// ── 汎用折れ線チャート（複数系列・ホバー付き）─────────
// series: [{name, color, points: [{x(ラベル), y(数値)}]}] 全系列同一の x 群を仮定
function drawChart(host, series, fmtY, fmtTip, baseline) {
  host.querySelectorAll("svg").forEach(s => s.remove());
  const tip = host.querySelector(".tooltip");
  const css = getComputedStyle(document.documentElement);
  const C = n => css.getPropertyValue(n).trim();
  const nPts = series[0].points.length;
  const W = host.clientWidth, H = 260, m = {t: 14, r: 18, b: 26, l: 58};
  const iw = W - m.l - m.r, ih = H - m.t - m.b;
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("height", H);

  const all = series.flatMap(s => s.points.map(p => p.y));
  let lo = Math.min(...all), hi = Math.max(...all);
  if (baseline != null) { lo = Math.min(lo, baseline); hi = Math.max(hi, baseline); }
  const pad = Math.max((hi - lo) * 0.08, Math.abs(hi) * 0.004, 0.01);
  lo -= pad; hi += pad;
  const X = i => nPts === 1 ? m.l + iw / 2 : m.l + iw * i / (nPts - 1);
  const Y = v => m.t + ih * (1 - (v - lo) / (hi - lo));

  const rawStep = (hi - lo) / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const step = [1, 2, 2.5, 5, 10].map(k => k * mag).find(s => s >= rawStep);
  for (let v = Math.ceil(lo / step) * step; v <= hi; v += step) {
    const g = document.createElementNS(ns, "line");
    g.setAttribute("x1", m.l); g.setAttribute("x2", W - m.r);
    g.setAttribute("y1", Y(v)); g.setAttribute("y2", Y(v));
    g.setAttribute("stroke", C("--grid")); g.setAttribute("stroke-width", 1);
    svg.appendChild(g);
    const t = document.createElementNS(ns, "text");
    t.setAttribute("x", m.l - 8); t.setAttribute("y", Y(v) + 4);
    t.setAttribute("text-anchor", "end"); t.setAttribute("font-size", 11);
    t.setAttribute("fill", C("--muted"));
    t.textContent = fmtY(v);
    svg.appendChild(t);
  }

  const xs = series[0].points;
  const tickEvery = Math.max(1, Math.ceil(nPts / 6));
  xs.forEach((p, i) => {
    if (i % tickEvery !== 0 && i !== nPts - 1) return;
    const t = document.createElementNS(ns, "text");
    t.setAttribute("x", X(i)); t.setAttribute("y", H - 8);
    t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", 11);
    t.setAttribute("fill", C("--muted"));
    t.textContent = p.x.slice(5).replace("-", "/");
    svg.appendChild(t);
  });

  for (const s of series) {
    if (nPts > 1) {
      const pts = s.points.map((p, i) => `${X(i)},${Y(p.y)}`);
      if (series.length === 1) {
        const area = document.createElementNS(ns, "path");
        area.setAttribute("d", `M${pts.join("L")}L${X(nPts - 1)},${Y(lo)}L${X(0)},${Y(lo)}Z`);
        area.setAttribute("fill", s.color); area.setAttribute("opacity", "0.1");
        svg.appendChild(area);
      }
      const line = document.createElementNS(ns, "path");
      line.setAttribute("d", "M" + pts.join("L"));
      line.setAttribute("fill", "none"); line.setAttribute("stroke", s.color);
      line.setAttribute("stroke-width", 2); line.setAttribute("stroke-linejoin", "round");
      line.setAttribute("stroke-linecap", "round");
      svg.appendChild(line);
    }
    const dot = document.createElementNS(ns, "circle");
    dot.setAttribute("cx", X(nPts - 1)); dot.setAttribute("cy", Y(s.points[nPts - 1].y));
    dot.setAttribute("r", 4.5); dot.setAttribute("fill", s.color);
    dot.setAttribute("stroke", C("--surface")); dot.setAttribute("stroke-width", 2);
    svg.appendChild(dot);
  }

  const hair = document.createElementNS(ns, "line");
  hair.setAttribute("stroke", C("--baseline")); hair.setAttribute("stroke-width", 1);
  hair.setAttribute("y1", m.t); hair.setAttribute("y2", m.t + ih); hair.style.display = "none";
  svg.appendChild(hair);
  const hdots = series.map(s => {
    const d = document.createElementNS(ns, "circle");
    d.setAttribute("r", 4.5); d.setAttribute("fill", s.color);
    d.setAttribute("stroke", C("--surface")); d.setAttribute("stroke-width", 2);
    d.style.display = "none"; svg.appendChild(d); return d;
  });

  function onMove(ev) {
    const rect = svg.getBoundingClientRect();
    const px = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
    let best = 0, bd = Infinity;
    for (let i = 0; i < nPts; i++) { const dd = Math.abs(X(i) - px); if (dd < bd) { bd = dd; best = i; } }
    const x = X(best);
    hair.setAttribute("x1", x); hair.setAttribute("x2", x); hair.style.display = "";
    series.forEach((s, si) => {
      hdots[si].setAttribute("cx", x); hdots[si].setAttribute("cy", Y(s.points[best].y));
      hdots[si].style.display = "";
    });
    tip.innerHTML = fmtTip(best);
    tip.style.display = "block";
    const tw = tip.offsetWidth;
    tip.style.left = Math.min(Math.max(x - tw / 2, 0), W - tw) + "px";
    tip.style.top = "6px";
  }
  function onLeave() { hair.style.display = "none"; hdots.forEach(d => d.style.display = "none"); tip.style.display = "none"; }
  svg.addEventListener("mousemove", onMove);
  svg.addEventListener("mouseleave", onLeave);
  svg.addEventListener("touchstart", onMove, {passive: true});
  svg.addEventListener("touchmove", onMove, {passive: true});
  host.appendChild(svg);
}

// ── 3口座比較 ─────────────────────────────────────────
function renderComparison() {
  const rows = DATA.accounts.map((a, i) => {
    const last = a.daily[a.daily.length - 1];
    const cum = last.total - a.capital;
    return `<tr>
      <td><span class="swatch" style="background:${colorOf(i)}"></span> ${esc(a.label)}</td>
      <td class="num">${yen(last.total)}</td>
      ${deltaCells(last.change, last.change_pct)}
      <td class="num ${cls(cum)}">${signedYen(cum)}</td>
      <td class="num ${cls(cum)}">${pct(cum / a.capital * 100)}</td>
    </tr>`;
  });
  document.getElementById("cmp-table").innerHTML =
    table(["口座", "総資産", "前日比", "前日比%", "累積損益", "累積%"], rows);

  document.getElementById("cmp-legend").innerHTML = DATA.accounts.map((a, i) =>
    `<span class="item"><span class="swatch" style="background:${colorOf(i)}"></span>${esc(a.label)}</span>`).join("");

  const series = DATA.accounts.map((a, i) => ({
    name: a.label, color: colorOf(i),
    points: a.daily.map(d => ({x: d.date, y: (d.total / a.capital - 1) * 100})),
  }));
  drawChart(document.getElementById("cmp-chart"), series,
    v => pct(v),
    i => `<strong>${esc(DATA.accounts[0].daily[i].date)}</strong><br>` +
         DATA.accounts.map((a, ai) =>
           `<span class="swatch" style="background:${colorOf(ai)};width:9px;height:9px"></span> ` +
           `${esc(a.label)}: ${pct((a.daily[i].total / a.capital - 1) * 100)}`).join("<br>"),
    0);
  document.getElementById("cmp-note").textContent =
    "累積リターン（％）の比較。" + (DATA.accounts[0].daily.length === 1 ? "初日です。営業日ごとにデータが積み上がります。" : "");
}

        a.trades.map(t =>
          `<tr><td>${esc(t.date)}</td><td><span class="chip ${t.side}">${t.side === "buy" ? "買" : "売"}</span></td>` +
          `<td>${esc(t.name)}</td><td class="num">${t.shares}</td><td class="num">${yen(t.value)}</td>` +
          `<td class="reason">${esc(t.reason)}</td></tr>`))
    : '<div class="note">まだ売買はありません。</div>';
}

function renderAcctTabs() {
  const host = document.getElementById("acct-tabs");
  host.innerHTML = DATA.accounts.map((a, i) =>
    `<button role="tab" data-i="${i}" aria-selected="${i === currentAcct}">` +
    `<span class="swatch" style="background:${colorOf(i)};width:9px;height:9px;margin-right:6px"></span>${esc(a.label)}</button>`).join("");
  host.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
    currentAcct = Number(b.dataset.i);
    host.querySelectorAll("button").forEach(x => x.setAttribute("aria-selected", String(x === b)));
    renderDetail();
  }));
}

renderComparison();
renderAcctTabs();
renderDetail();
let rT; addEventListener("resize", () => { clearTimeout(rT); rT = setTimeout(() => { renderComparison(); renderDetail(); }, 150); });
</script>

</body>
</html>
